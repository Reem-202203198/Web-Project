<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - CineFan</title>
  <link rel="stylesheet" href="style.css">

</head>
<body class="auth-body">
  <main class="auth-layout">
    <section class="auth-card">
      <h1 class="brand-name">CineFan</h1>
      <h2 class="auth-title">Login</h2>
      <p class="auth-subtitle">
        Welcome back! Log in to continue.
      </p>
      <form class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input class="input-field" id="email" type="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input class="input-field" id="password" type="password" placeholder="Password" required>
        </div>
        <button class="primary-btn" type="submit">Login</button>
      </form>

      <p class="auth-text">
        Don't have an account? 
        <a class="auth-link" href="register.html">Register</a>
      </p>
    </section>
  </main>
   <script src="js/storage.js"></script>
  <script src="js/login.js"></script> 
</body>
</html>
