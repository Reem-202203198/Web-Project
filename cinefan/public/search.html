<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineFan - Search</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body">

  <header class="topbar">
    <div class="logo-text">CineFan</div>
    <div class="search-bar">
      <input type="text" placeholder="Search movies, reviews, and users..." />
    </div>
    <nav class="main-nav">
      <a href="feed.html">Home</a>
      <a href="profile.html">Profile</a>
      <a href="search.html" class="active">Search</a>
    </nav>
    <button id="logout-btn">Logout</button>
  </header>

  <main style="max-width: 700px; margin: 40px auto; padding: 0 20px;">
    <h2 style="color: white; margin-bottom: 20px;">🔍 Search Users</h2>

    <input
      type="text"
      id="search-input"
      placeholder="Search users by username..."
      style="
        width: 100%;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid #333;
        background: #1a1a1a;
        color: white;
        font-size: 16px;
        box-sizing: border-box;
        margin-bottom: 20px;
      "
    />

    <div id="search-results">
      <p style="color: #aaa;">Start typing to find users...</p>
    </div>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
